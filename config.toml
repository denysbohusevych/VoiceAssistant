# ─── VoiceAssistant Config ────────────────────────────────────────────────────
# Этот файл читается при старте и перезагружается автоматически каждые 3 секунды.
# Вы можете менять параметры на лету, не перезапуская приложение.

# ─── Whisper STT ──────────────────────────────────────────────────────────────
[whisper]
# Путь к GGML-модели. Скачать: bash models/download.sh base
model_path = "models/ggml-large-v3-turbo.bin"

# Язык распознавания: "auto", "ru", "en" и т.д.
language = "auto"

# Минимальное число сэмплов (меньше — не транскрибируем, это шум)
min_audio_samples = 4000

# Порог "нет речи": если вероятность тишины выше этого — сегмент пропускается
no_speech_threshold = 0.4

# Порог энтропии: высокий = галлюцинации, низкий = чрезмерная уверенность
entropy_threshold = 2.4

# Подсказка для модели — помогает распознавать технические термины
initial_prompt = "Привет, это test voice command. Я пишу код на Rust, Python. System initialization."

# ─── Аудио пайплайн ───────────────────────────────────────────────────────────
[audio]
# Порог тишины RMS. Меньше этого — фоновый шум, транскрипция не запускается
silence_threshold = 0.005

# Как часто проверять буфер (мс). Меньше = быстрее реакция, но больше CPU
chunk_duration_ms = 500

# Максимальное окно (сек) перед принудительной нарезкой (Sliding Window)
sliding_window_max_seconds = 12.0

# Перекрытие (сек) при нарезке — сохраняет контекст между кусками
overlap_seconds = 1.5

# ─── AI провайдер ─────────────────────────────────────────────────────────────
[ai]
# Провайдер: "ollama" | "gemini" | "openai" | "claude" | "deepseek"
provider = "ollama"

# Модель. Примеры:
#   ollama:   "qwen3.5:0.8b", "llama3", "mistral"
#   gemini:   "gemini-2.5-flash", "gemini-2.0-pro"
#   openai:   "gpt-4o", "gpt-4o-mini"
#   claude:   "claude-sonnet-4-6", "claude-opus-4-6"
#   deepseek: "deepseek-chat", "deepseek-reasoner"
model = "qwen3.5:0.8b"

# Максимальное число токенов в ответе AI
max_tokens = 2048

# Температура генерации (0.0 — детерминированно, 1.0 — творчески)
temperature = 0.7

# Опциональный путь к файлу с системным промптом (переопределяет встроенный)
# system_prompt_file = "system_prompt.txt"

# ─── HTTP таймауты (для облачных провайдеров) ──────────────────────────────────
[ai.http_timeouts]
connect_secs = 15
read_secs    = 120   # 120с — достаточно даже для медленных моделей (o1, DeepSeek-R1)
write_secs   = 30

# ─── Ollama (локальные модели) ────────────────────────────────────────────────
[ai.ollama]
base_url    = "http://localhost:11434"
num_predict = 5000
num_ctx     = 6000

# ─── Хоткей Push-to-Talk ─────────────────────────────────────────────────────
[hotkey]
# Клавиша записи. Варианты:
#   "AltRight", "CapsLock"
#   "F1".."F12"
#   Одиночный символ: "a", "z", "0"..
push_to_talk = "AltRight"

# ─── Зрение (Vision) ──────────────────────────────────────────────────────────
[vision]
# AX Tree считается "рабочим" если полезных узлов не меньше этого числа
ax_tree_min_useful_nodes = 5

# Минимальная доля экрана, покрытая контентом (иначе — OCR-фолбек)
ax_tree_min_coverage_ratio = 0.35

# ─── Геометрия раскладки (Layout, OCR-фолбек) ────────────────────────────────
[vision.layout]
# Как близко по Y (в долях высоты символа) слова считаются одной строкой
line_y_alignment_ratio     = 0.4

# Максимальный горизонтальный пробел (в высотах символа) для слияния слов
word_merge_x_gap_ratio     = 1.5
word_merge_x_overlap_ratio = 1.0

# Максимальный вертикальный зазор для слияния строк в блок
block_y_gap_ratio          = 1.2
block_x_overlap_ratio      = 0.5
block_x_alignment_ratio    = 3.0

# Минимальная ширина "зазора" между колонками (в высотах символа)
column_gutter_ratio        = 4.0

# Минимальное число блоков для самостоятельной колонки
column_min_blocks          = 3